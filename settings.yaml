environments:
  dev:
    spark:
      app_name: "job-platform-dev"
      master: "local[*]"
      config:
        spark.sql.shuffle.partitions: 4
    storage:
      type: "local"
    paths:
      root: ./data
      metadata: ./metadata
    bronze:
      query: "data engineer"
      country: "us"
      location: "Chicago"
      max_pages: 5
      min_interval_seconds: 2.5
    gold:
      fact_per_job_ratio_threshold: 20
    ml:
      min_clusters: 3
      min_silhouette: 0.2
      window_days: 30
    logging_level: "DEBUG"

  prod:
    spark:
      app_name: "job-platform-prod"
      master: "yarn"
      config:
        spark.sql.shuffle.partitions: 200
    storage:
      type: "gcs"
    paths:
      root: gs://job-pipeline
      metadata: gs://job-pipeline/metadata
    bronze:
      query: "data engineer"
      location: "London"
      max_pages: 5
    gold:
      fact_per_job_ratio_threshold: 20
    ml:
      min_clusters: 3
      min_silhouette: 0.2
      window_days: 30
    logging_level: "INFO"
