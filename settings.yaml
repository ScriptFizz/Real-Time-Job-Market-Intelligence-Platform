environments:
  dev:
    spark:
      app_name: "job-platform-dev"
      master: "local[*]"
      config:
        spark.sql.shuffle.partitions: 4
    storage:
      type: "local"
    paths:
      root: ./data
      metadata: ./metadata
      bronze: ./data/bronze
      silver: ./data/silver
      gold_v1: ./data/gold_v1
      gold_v2: ./data/gold_v2
    bronze:
      query: "data engineer"
      country: "us"
      location: "Chicago"
      max_pages: 20
      min_interval_seconds: 2.5
    gold:
      fact_per_job_ratio_threshold: 20
    ml:
      min_clusters: 3
      min_silhouette: 0.2
      window_days: 30
    logging_level: "DEBUG"

  prod:
    spark:
      app_name: "job-platform-prod"
      master: "yarn"
      config:
        spark.sql.shuffle.partitions: 200
    storage:
      type: "gcs"
    paths:
      root: gs://job-pipeline
      metadata: gs://job-pipeline/metadata
      bronze: gs://job-pipeline/bronze
      silver: gs://job-pipeline/silver
      gold: gs://job-pipeline/gold
    bronze:
      query: "data engineer"
      location: "London"
    gold:
      fact_per_job_ratio_threshold: 20
    ml:
      min_clusters: 3
      min_silhouette: 0.2
      window_days: 30
    logging_level: "INFO"
